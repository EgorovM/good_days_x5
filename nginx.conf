# Пример для установки в /etc/nginx/sites-available/snowjass.ru
# и симлинка: ln -s /etc/nginx/sites-available/snowjass.ru /etc/nginx/sites-enabled/
# Перед certbot: mkdir -p /var/www/certbot/.well-known/acme-challenge
# Webroot: certbot certonly --webroot -w /var/www/certbot -d snowjass.ru -d www.snowjass.ru
# Или плагин: certbot --nginx -d snowjass.ru -d www.snowjass.ru (подставит ssl сам)

server {
    listen 80;
    listen [::]:80;
    server_name snowjass.ru www.snowjass.ru;

    # HTTP-01 challenge (webroot). Должен отдаваться как статика, без редиректа на HTTPS.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        # Заголовок X-Telegram-Bot-Api-Secret-Token nginx по умолчанию пробрасывает на upstream.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # VK Mini App: страница /vk/miniapp открывается во iframe с vk.com. Если внутри VK «белый экран»,
    # а по прямой ссылке всё ок — проверьте Cloudflare / хостинг: не должно быть X-Frame-Options: DENY/SAMEORIGIN
    # на ответах прокси (иначе браузер блокирует iframe). В FastAPI для /vk/miniapp задан CSP frame-ancestors под VK.
}
