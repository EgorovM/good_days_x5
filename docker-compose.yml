services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Кладите картинки в ./static/images — бот отдаст их по /static/images/<имя>
      - ./static:/app/static:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
            "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./static:/app/static:ro
    restart: unless-stopped

volumes:
  redis-data:
